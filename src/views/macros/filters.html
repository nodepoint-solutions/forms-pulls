{% macro filterForm(repoItems, authorItems, query, action) %}
<form method="GET" action="{{ action }}" class="app-filters">

  <div class="app-filter-field">
    <label class="app-filter-label" for="repo">Repository</label>
    <select id="repo" name="repo" class="app-select">
      {% for item in repoItems %}
        <option value="{{ item.value }}"{% if item.selected %} selected{% endif %}>{{ item.text }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="app-filter-field">
    <label class="app-filter-label" for="author">Author</label>
    <select id="author" name="author" class="app-select">
      {% for item in authorItems %}
        <option value="{{ item.value }}"{% if item.selected %} selected{% endif %}>{{ item.text }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="app-filter-field">
    <label class="app-filter-label" for="sort">Sort by</label>
    <select id="sort" name="sort" class="app-select">
      <option value="age"{% if query.sort == "age" %} selected{% endif %}>Age</option>
      <option value="updated"{% if query.sort == "updated" %} selected{% endif %}>Last updated</option>
      <option value="title"{% if query.sort == "title" %} selected{% endif %}>Title</option>
      <option value="author"{% if query.sort == "author" %} selected{% endif %}>Author</option>
    </select>
  </div>

  <div class="app-filter-field">
    <label class="app-filter-label" for="dir">Direction</label>
    <select id="dir" name="dir" class="app-select">
      <option value="desc"{% if query.dir == "desc" %} selected{% endif %}>Newest first</option>
      <option value="asc"{% if query.dir == "asc" %} selected{% endif %}>Oldest first</option>
    </select>
  </div>

  <div class="app-filter-actions">
    <button type="submit" class="app-btn app-btn--primary">Apply</button>
    {% if query.repo or query.author %}
      <a href="{{ action }}" class="app-btn app-btn--ghost">Clear</a>
    {% endif %}
  </div>

</form>
{% endmacro %}
